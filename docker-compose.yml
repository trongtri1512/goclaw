# All-in-one docker-compose — goclaw + postgres + chrome (browser) + web dashboard.
#
# The default `latest` image includes an embedded web dashboard (no separate nginx needed).
# Web UI is served at the same port as the API (default: 18790).
#
# Quick start:
#   docker compose up -d --build
#
# Optional nginx (for custom SSL, reverse proxy, caching):
#   make up WITH_WEB_NGINX=1
#   # or: docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.selfservice.yml up -d
#   # Dashboard via nginx: http://localhost:3000
#
# Docker image variants:
#   latest       — Backend + embedded web UI + Python (recommended)
#   latest-base  — Backend API-only, no web UI, no runtimes
#   latest-full  — All runtimes + skill dependencies pre-installed
#   latest-otel  — Latest + OpenTelemetry tracing
#
# With OTel tracing:  add -f docker-compose.otel.yml
# With Claude CLI:    add -f docker-compose.claude-cli.yml

services:
  # ── PostgreSQL (pgvector) ──
  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goclaw}
      POSTGRES_DB: ${POSTGRES_DB:-goclaw}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goclaw} -d ${POSTGRES_DB:-goclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Chrome CDP sidecar (headless browser for automation) ──
  chrome:
    image: zenika/alpine-chrome:124
    command:
      - --no-sandbox
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --remote-allow-origins=*
      - --disable-gpu
      - --disable-dev-shm-usage
      # Stealth / Anti-Bot flags for TikTok
      - --disable-blink-features=AutomationControlled
      - --user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
    ports:
      - "${CHROME_CDP_PORT:-9222}:9222"
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9222/json/version >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
    restart: unless-stopped

  # ── GoClaw (core) ──
  goclaw:
    image: ghcr.io/nextlevelbuilder/goclaw:latest
    build:
      context: ${GOCLAW_DIR:-.}
      dockerfile: Dockerfile
      args:
        ENABLE_OTEL: "${ENABLE_OTEL:-false}"
        ENABLE_EMBEDUI: "${ENABLE_EMBEDUI:-true}"  # set to false when using WITH_WEB_NGINX
        ENABLE_PYTHON: "${ENABLE_PYTHON:-true}"
        ENABLE_FULL_SKILLS: "true"
        VERSION: "${GOCLAW_VERSION:-dev}"
    # Uncomment to test update UI: GOCLAW_VERSION=v1.0.0
    ports:
      - "${GOCLAW_PORT:-18790}:18790"
    env_file:
      - path: .env
        required: false
    environment:
      - GOCLAW_HOST=0.0.0.0
      - GOCLAW_PORT=18790
      - GOCLAW_CONFIG=/app/data/config.json
      - GOCLAW_GATEWAY_TOKEN=${GOCLAW_GATEWAY_TOKEN:-}
      - GOCLAW_ENCRYPTION_KEY=${GOCLAW_ENCRYPTION_KEY:-}
      - GOCLAW_SKILLS_DIR=/app/data/skills
      - GOCLAW_POSTGRES_DSN=postgres://${POSTGRES_USER:-goclaw}:${POSTGRES_PASSWORD:-goclaw}@postgres:5432/${POSTGRES_DB:-goclaw}?sslmode=disable
      - GOCLAW_BROWSER_REMOTE_URL=ws://chrome:9222
      # Debug
      - GOCLAW_TRACE_VERBOSE=${GOCLAW_TRACE_VERBOSE:-0}
    volumes:
      - goclaw-data:/app/data
      - goclaw-workspace:/app/workspace
      - goclaw-skills:/app/skills
      - goclaw-dotdir:/app/.goclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    init: true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '8.0'
          pids: 2048
    networks:
      - default
      - goclaw-net
    depends_on:
      postgres:
        condition: service_healthy
      chrome:
        condition: service_healthy
    restart: unless-stopped

  # ── Web Dashboard (React SPA) ──
  goclaw-ui:
    image: ghcr.io/nextlevelbuilder/goclaw-web:latest
    build:
      context: ./ui/web
      dockerfile: Dockerfile
    ports:
      - "${GOCLAW_UI_PORT:-3000}:80"
    networks:
      - default
      - goclaw-net
    depends_on:
      - goclaw
    volumes:
      - ./ui/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres-data:
  goclaw-data:
  goclaw-workspace:
  goclaw-skills:
  goclaw-dotdir:

networks:
  goclaw-net:
    name: goclaw-net
    driver: bridge
